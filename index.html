<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>simon say game</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Simon Says Game</h1>
        <h2>Press any key to start the game</h2>
        <h3 id="high-score">High-Score: 0</h3>
        <div class="btn-container">
        <div class="line-one">
            <div class="btn red" id="red">1</div>
        <div class="btn yellow" id="yellow">2</div>
        </div>
        <div class="line-two">
           <div class="btn blue" id="blue">3</div>
        <div class="btn green" id="green">4</div>
    </div>
       
        </div>
        <script src="app.js"></script>
    </body>
</html>
